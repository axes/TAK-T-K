<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tactical Neon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0f;
        --text: #ffffff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: radial-gradient(circle at top, #111118 0%, #0d0d0f 55%, #09090b 100%);
        color: var(--text);
        font-family: monospace;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
